<!DOCTYPE html>
<html>
<head>
    <title>YR Printing Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="chat-container">

    <div class="chat-header">
        🖨️ YR PRINTING ASSISTANT
    </div>

    <div id="chat-box">

        <div class="bot">
            👋 Welcome! Choose a service:
        </div>

        <button onclick="startChat('Flex Printing')">Flex Printing</button>
        <button onclick="startChat('Laser Engraving')">Laser Engraving</button>
        <button onclick="startChat('Radium Stickering')">Radium Stickers</button>
        <button onclick="startChat('3D Printing')">3D Printing</button>
        <button onclick="startChat('Vinyl Stickers')">Vinyl Stickers</button>
        <button onclick="startChat('Flyers & Posters')">Flyers / Posters</button>

    </div>

    <!-- INPUT BOX (IMPORTANT FIX) -->
    <div class="input-area">

    <!-- FILE UPLOAD -->
    <input type="file" id="fileInput" accept="image/*,.pdf">

    <!-- TEXT INPUT -->
    <input type="text" id="userInput" placeholder="Type your message...">

    <!-- SEND BUTTON -->
    <button onclick="sendMessage()">Send</button>

</div>

<script src="script.js"></script>

</body>
</html>
